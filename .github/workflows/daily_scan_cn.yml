name: Daily Stock Scan (CN A-Share)

on:
  # 定时触发 - 北京时间
  schedule:
    # 盘前: UTC 01:00 = 北京 9:00 AM
    - cron: '0 1 * * 1-5'
    # 盘中: UTC 05:00 = 北京 13:00 (1:00 PM)
    - cron: '0 5 * * 1-5'
    # 盘后: UTC 09:30 = 北京 17:30 (30分钟后)
    - cron: '30 9 * * 1-5'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      scan_date:
        description: 'Scan date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      limit:
        description: 'Limit number of stocks (0 = all)'
        required: false
        default: '0'

# 权限 - 允许写入仓库
permissions:
  contents: write

env:
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}


jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 最长运行2小时 (A股约5000只)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy plotly tushare tqdm requests python-dotenv
      
      - name: Run CN A-Share scan
        working-directory: versions/v2
        env:
          TZ: Asia/Shanghai
          PYTHONPATH: ${{ github.workspace }}/versions/v2
        run: |
          # 确定扫描日期 (使用北京时间)
          SCAN_DATE="${{ github.event.inputs.scan_date }}"
          if [ -z "$SCAN_DATE" ]; then
            # 使用北京时间获取日期
            SCAN_DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          fi
          
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then
            LIMIT="0"
          fi
          
          echo "📅 Scanning CN A-Shares for date: $SCAN_DATE (Beijing Time)"
          echo "📊 Stock limit: $LIMIT"
          echo "🔧 PYTHONPATH: $PYTHONPATH"
          
          # 创建数据库目录
          mkdir -p db
          
          # 运行A股扫描
          python services/scan_service.py --date "$SCAN_DATE" --market CN --workers 10 --limit "$LIMIT"
      
      - name: Generate scan report
        working-directory: versions/v2
        run: |
          python -c "
          from db.database import get_db_stats, query_scan_results, get_scanned_dates, get_stock_info_batch
          import json
          
          stats = get_db_stats()
          print('📊 Scan Statistics:')
          print(f'   Total records: {stats[\"total_records\"]}')
          print(f'   Total symbols: {stats[\"total_symbols\"]}')
          print(f'   Date range: {stats[\"min_date\"]} ~ {stats[\"max_date\"]}')
          
          # 获取最新扫描结果
          dates = get_scanned_dates(market='CN')
          if dates:
              latest = dates[0]
              results = query_scan_results(scan_date=latest, market='CN', limit=20)
              
              # 获取股票名称
              symbols = [r['symbol'] for r in results]
              stock_info = get_stock_info_batch(symbols) if symbols else {}
              
              print(f'\n🏆 Top 20 A-Share signals for {latest}:')
              for r in results:
                  info = stock_info.get(r['symbol'], {})
                  name = info.get('name', '')[:8] if info else ''
                  print(f'   {r[\"symbol\"]:10} | {name:8} | ¥{r[\"price\"]:8.2f} | BLUE: {r[\"blue_daily\"]:5.1f}')
              
              # 构建 top_signals
              top_signals = []
              for r in results[:15]:
                  info = stock_info.get(r['symbol'], {})
                  top_signals.append({
                      'symbol': r['symbol'],
                      'name': info.get('name', '') if info else '',
                      'price': r['price'],
                      'day_blue': r['blue_daily'],
                      'week_blue': r['blue_weekly']
                  })
              
              # 保存摘要到文件
              summary = {
                  'date': latest,
                  'market': 'CN',
                  'total_signals': len(query_scan_results(scan_date=latest, market='CN')),
                  'top_signals': top_signals
              }
              with open('scan_summary_cn.json', 'w') as f:
                  json.dump(summary, f, indent=2, ensure_ascii=False)
          "
      
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-database-cn-${{ github.run_number }}
          path: versions/v2/db/coral_creek.db
          retention-days: 30
      
      - name: Upload scan summary
        uses: actions/upload-artifact@v4
        with:
          name: scan-summary-cn-${{ github.run_number }}
          path: versions/v2/scan_summary_cn.json
          retention-days: 30
          if-no-files-found: ignore
      
      # 同步到 Supabase 云数据库
      - name: Sync to Supabase
        working-directory: versions/v2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip install supabase
          python scripts/sync_to_supabase.py --days 3
      
      # 发送通知 (Telegram + Email)
      - name: Send notifications
        working-directory: versions/v2
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
          BARK_URL: ${{ secrets.BARK_URL }}
          BARK_GROUP: ${{ secrets.BARK_GROUP }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: |
          # For CN market, rename summary file temporarily
          if [ -f scan_summary_cn.json ]; then
            mv scan_summary_cn.json scan_summary.json
          fi
          python scripts/send_notification.py
          if [ -f scan_summary.json ]; then
            mv scan_summary.json scan_summary_cn.json
          fi

      # ML Daily Scorer (CN)
      - name: ML Daily Scorer & Paper Trading (CN)
        working-directory: versions/v3
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/versions/v3
        continue-on-error: true
        run: |
          pip install xgboost joblib scikit-learn 2>/dev/null || true
          # 1. ML scorer: 输出 Top-3 per exchange+tier
          python scripts/ml_daily_scorer.py --market CN --top 3 || echo "ML scorer failed (no cache?)"
          # 2. Paper trading: 模拟盘下单和结算
          python scripts/paper_trading.py --market CN || echo "Paper trading update skipped"

      # 回填并刷新 candidate_tracking（避免策略统计样本为0或收益全0）
      - name: Rebuild candidate tracking (CN)
        working-directory: versions/v3
        run: |
          mkdir -p db
          cp ../v2/db/coral_creek.db db/coral_creek.db || true
          python scripts/backfill_candidate_tracking.py --market CN --recent-days 420 --max-per-day 800 --refresh-rows 12000
          cp db/coral_creek.db ../v2/db/coral_creek.db || true
      
      # 预计算退出规则结果（全量数据，前端秒出）
      - name: Pre-compute exit rule results (CN)
        working-directory: versions/v3
        timeout-minutes: 15
        run: |
          python scripts/precompute_exit_results.py --market CN --rules fixed_5d,fixed_10d,fixed_20d,tp_sl_time --batch-size 5000
      
      # 提交数据库到仓库 - 用于 Render
      - name: Commit database to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 同步 v2 数据库到 v3（v3 Streamlit 页面读取）
          mkdir -p versions/v3/db
          cp versions/v2/db/coral_creek.db versions/v3/db/coral_creek.db || true
          
          # 添加数据库文件
          git add versions/v2/db/coral_creek.db || true
          git add versions/v3/db/coral_creek.db || true
          git add versions/v3/db/precomputed.db || true
          git add versions/v3/db/ml_daily_picks.db || true
          git add versions/v2/scan_summary_cn.json || true
          
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update: CN A-Share scan results for $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
            
            # 尝试 rebase，如果失败则使用 ours 策略合并
            if ! git pull --rebase origin main; then
              echo "Rebase failed, resolving conflicts with ours strategy..."
              git rebase --abort || true
              git pull -X ours origin main || true
              git push || git push --force-with-lease
            else
              git push
            fi
          fi
